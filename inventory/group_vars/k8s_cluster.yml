kube_network_plugin: cilium
container_manager: containerd

# Own Kubernetes-managed dirs as root instead of the default `kube` user.
# Cilium v1.19's init containers (mount-cgroup, install-cni-binaries) run as
# root with DAC_OVERRIDE dropped, so they cannot write to /opt/cni/bin when it
# is owned by `kube` (mode 0755) -- the agent pods fail with
# "cp: cannot create regular file '/hostbin/cilium-mount': Permission denied".
# Making these dirs root-owned lets the init containers write. The control
# plane components run as root regardless, so this is safe.
kube_owner: root

# Allow workloads on control plane nodes
kube_control_plane_node_taints: []

# Copy kubeconfig and kubectl to the ansible controller
kubeconfig_localhost: true
kubectl_localhost: true

# Include node IPs in the API server cert for host-level kubectl access
supplementary_addresses_in_ssl_cert:
  - 192.168.56.11
  - 192.168.56.12
  - 192.168.56.13
  - 192.168.56.14
